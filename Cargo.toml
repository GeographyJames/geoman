[package]
name = "geoman"
version = "0.1.0"
edition = "2024"
authors = ["James Campbell"]

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/app/main.rs"
name = "geoman"


[dependencies]
actix-web = "4.11.0"
uuid = { version = "1.18.1", features = ["v4"] }
anyhow = "1.0.100"
strum = { version = "0.27.2", features = ["derive"] }
clerk-rs = { version = "0.4.1", features = ["actix"] }
config = "0.15.18"
secrecy = { version = "0.10.3", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
dotenvy = "0.15.7"
tracing = "0.1.41"
tracing-bunyan-formatter = "0.3.10"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
tracing-log = "0.2.0"
tracing-actix-web = "0.7.19"
geojson = "0.24.2"
geo-types = "0.7.17"
utoipa = { version = "4.2.3", features = [
    "actix_extras",
] } # Cannot upgrade to 5 due to OpenAPI 3.1 breaking OGC test suit 
sqlx = { version = "0.8.6", features = [
    "runtime-tokio-rustls",
    "macros",
    "postgres",
    "uuid",
    "chrono",
] }
log = "0.4.28"
slug = "0.1.6"
derive_more = { version = "2.0.1", features = ["as_ref"] }
chrono = { version = "0.4.42", features = ["serde"] }
futures = "0.3.31"
thiserror = "2.0.17"

[dev-dependencies]
rand = "0.9.2"
reqwest = "0.12.24"
tokio = { version = "1.48.0", features = ["sync"] }
