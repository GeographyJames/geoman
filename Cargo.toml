[package]
name = "geoman"
version = "0.1.0"
edition = "2024"
authors = ["James Campbell"]

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/app/main.rs"
name = "geoman"


[dependencies]
actix-web = "4.11"
uuid = { version = "1.18", features = ["v4"] }
anyhow = "1.0"
strum = { version = "0.27", features = ["derive"] }
clerk-rs = { version = "0.4", features = ["actix"] }
config = "0.15"
secrecy = { version = "0.10", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-bunyan-formatter = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-log = "0.2"
tracing-actix-web = "0.7"
geojson = "0.24"
geo-types = "0.7"
utoipa = { version = "4.2.3", features = [
    "actix_extras",
] } # Cannot upgrade to 5 due to OpenAPI 3.1 breaking OGC test suit 
sqlx = { version = "0.8", features = [
    "runtime-tokio-rustls",
    "macros",
    "postgres",
    "uuid",
    "chrono",
] }
log = "0.4"
slug = "0.1"
derive_more = { version = "2.0", features = ["as_ref"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
thiserror = "2.0"

[dev-dependencies]
rand = "0.9"
reqwest = "0.12"
rstest = "0.26"
tokio = { version = "1.48", features = ["sync"] }
